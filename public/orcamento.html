  <!-- ── PDF Generation ──────────────────────────────────────────────────── -->
  <script>
  (function() {
    var NAVY  = '#1B3A5C';
    var GOLD  = '#C9A87A';
    var LGOLD = '#F5EDD8';
    var CREAM = '#FAF7F2';
    var GRAY  = '#6B7280';
    var DGRAY = '#374151';

    var INCLUSO = [
      'Todo material necessário para a operação de buffet | materiais de cozinha e utensílios necessários para realizarmos nosso serviço.',
      'Mão de obra qualificada e em quantidade necessária para um atendimento de excelência.',
      'Taças de água e refrigerante, vinho, champagne e copo de whisky | consulte-nos para saber as opções.',
      'Pratos, talheres, toalhas, sousplats, guardanapos de pano | consulte-nos para conhecer as opções.',
      'Gelo para todas as bebidas servidas pelo Buffet | Incluindo whisky.',
      'Alimentação para toda a equipe do Buffet Rondello.'
    ];
    var NAO_INCLUSO = [
      'Vinhos, espumantes, whiskys ou qualquer outra bebida destilada | Oferecemos taças e servimos essas bebidas, porém não fornecemos e não cobramos rolha.',
      'Cadeiras, mesas, tampos de mesas, aparadores e outros mobiliários.',
      'Taxas de cozinha, lixo ou qualquer outra taxa para utilização da estrutura do salão.',
      'Alimentação de profissionais de outras empresas envolvidas no evento | consulte-nos para saber as condições.',
      'Frete para eventos fora de Sorocaba, Votorantim ou Araçoiaba | consulte-nos para eventos em outras cidades.'
    ];

    function fmtMoeda(val) {
      var n = parseFloat(String(val || '').replace(/\./g, '').replace(',', '.'));
      if (isNaN(n)) return val || '—';
      return 'R$ ' + n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    /* Colored box: wraps content in a table cell so fillColor works */
    function colorBox(stackContent, fillColor, layoutOverride) {
      return {
        table: { widths: ['*'], body: [[{ stack: stackContent, fillColor: fillColor }]] },
        layout: Object.assign({
          paddingTop: function() { return 16; },
          paddingBottom: function() { return 16; },
          paddingLeft: function() { return 20; },
          paddingRight: function() { return 20; },
          hLineWidth: function() { return 0; },
          vLineWidth: function() { return 0; }
        }, layoutOverride || {}),
        margin: [0, 0, 0, 0]
      };
    }

    /* Double gold rule ornament */
    function doubleRule(width) {
      width = width || 495;
      return {
        canvas: [
          { type: 'line', x1: 0,   y1: 0, x2: width, y2: 0, lineWidth: 1.5, lineColor: GOLD },
          { type: 'line', x1: 0,   y1: 4, x2: width, y2: 4, lineWidth: 0.4, lineColor: GOLD }
        ],
        margin: [0, 0, 0, 0]
      };
    }

    /* Thin single hairline */
    function hairline(width, color, marginArr) {
      return {
        canvas: [{ type: 'line', x1: 0, y1: 0, x2: width || 495, y2: 0, lineWidth: 0.5, lineColor: color || GOLD }],
        margin: marginArr || [0, 0, 0, 0]
      };
    }

    /* Small decorative diamond (rotated square via polyline) */
    function diamond(x, y, size, fillColor) {
      size = size || 4;
      return { type: 'polyline', points: [
        { x: x,        y: y - size },
        { x: x + size, y: y        },
        { x: x,        y: y + size },
        { x: x - size, y: y        }
      ], closePath: true, color: fillColor || GOLD, lineColor: fillColor || GOLD, lineWidth: 0.5 };
    }

    /* Centered diamond ornament between sections */
    function sectionDivider() {
      var w = 495;
      var cx = w / 2;
      return {
        canvas: [
          { type: 'line', x1: 0,       y1: 6, x2: cx - 14, y2: 6, lineWidth: 0.4, lineColor: GOLD },
          diamond(cx, 6, 4, GOLD),
          { type: 'line', x1: cx + 14, y1: 6, x2: w,       y2: 6, lineWidth: 0.4, lineColor: GOLD }
        ],
        margin: [0, 16, 0, 16]
      };
    }

    /* Gold filled bullet */
    function bulletOk() {
      return {
        canvas: [
          { type: 'ellipse', x: 5, y: 6, r1: 3.5, r2: 3.5, color: GOLD }
        ],
        width: 16, margin: [0, 1.5, 0, 0]
      };
    }

    /* Navy ring bullet (not included) */
    function bulletNo() {
      return {
        canvas: [
          { type: 'ellipse', x: 5, y: 6, r1: 3.5, r2: 3.5, color: '#FDEAEA', lineColor: '#C0392B', lineWidth: 1 }
        ],
        width: 16, margin: [0, 1.5, 0, 0]
      };
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    function buildHeader(logoB64, currentPage) {
      var isFirst = currentPage === 1;
      var logoW   = isFirst ? 110 : 72;
      var topMarg = isFirst ? 20 : 16;

      return {
        margin: [50, topMarg, 50, 0],
        stack: [
          {
            columns: [
              { image: logoB64, width: logoW, margin: [0, 0, 0, 0] },
              {
                stack: [
                  { text: 'PROPOSTA DE', fontSize: isFirst ? 7 : 6, color: GRAY, characterSpacing: 2.5, bold: false, alignment: 'right' },
                  { text: 'ORÇAMENTO', fontSize: isFirst ? 11 : 8, color: NAVY, bold: true, characterSpacing: isFirst ? 3 : 2, alignment: 'right' }
                ],
                margin: [0, isFirst ? 10 : 6, 0, 0]
              }
            ]
          },
          {
            canvas: [
              { type: 'line', x1: 0, y1: 5, x2: 495, y2: 5, lineWidth: 1.2, lineColor: GOLD },
              { type: 'line', x1: 0, y1: 8.5, x2: 495, y2: 8.5, lineWidth: 0.3, lineColor: GOLD }
            ],
            margin: [0, 4, 0, 0]
          }
        ]
      };
    }

    /* ── Footer ─────────────────────────────────────────────────────────── */
    function buildFooter(p, total) {
      return {
        margin: [50, 0, 50, 10],
        stack: [
          {
            canvas: [
              { type: 'line', x1: 0, y1: 0, x2: 495, y2: 0, lineWidth: 0.4, lineColor: GOLD }
            ],
            margin: [0, 0, 0, 5]
          },
          {
            columns: [
              {
                text: [
                  { text: 'Rondello Buffet', bold: true, color: NAVY },
                  { text: '  |  www.rondellobuffet.com.br', color: GRAY }
                ],
                fontSize: 7, characterSpacing: 0.3
              },
              { text: p + ' / ' + total, fontSize: 7, color: GRAY, characterSpacing: 0.5, alignment: 'right' }
            ]
          }
        ]
      };
    }

    /* ── CAPA (Página 1 — fundo navy via background) ─────────────────────── */
    function buildCover(cliente, fraseCapa) {
      var blocks = [];
      var frase = fraseCapa || 'Uma experiência gastronômica criada exclusivamente para seu casamento.';

      /* Push content down toward visual center */
      blocks.push({ text: '', margin: [0, 70, 0, 0] });

      /* Tiny eyebrow label */
      blocks.push({
        text: 'PROPOSTA EXCLUSIVA',
        fontSize: 6.5, color: GOLD + 'CC', characterSpacing: 5, bold: true,
        alignment: 'center', margin: [0, 0, 0, 26]
      });

      /* Client name — dominant, white, wide */
      if (cliente.nome) {
        blocks.push({
          text: cliente.nome.toUpperCase(),
          fontSize: 38, bold: true, color: '#FFFFFF',
          alignment: 'center', characterSpacing: 5, lineHeight: 1,
          margin: [0, 0, 0, 14]
        });
      }

      /* Refined gold ornament */
      blocks.push({
        canvas: [
          { type: 'line', x1: 167, y1: 5, x2: 228, y2: 5, lineWidth: 0.5, lineColor: GOLD + '66' },
          diamond(247.5, 5, 3.2, GOLD),
          { type: 'line', x1: 267, y1: 5, x2: 328, y2: 5, lineWidth: 0.5, lineColor: GOLD + '66' }
        ],
        margin: [0, 0, 0, 18]
      });

      /* Date + local — gold, same line */
      var detLine = [];
      if (cliente.data) detLine.push(cliente.data);
      if (cliente.local) detLine.push(cliente.local.toUpperCase());
      if (detLine.length) {
        blocks.push({
          text: detLine.join('   ·   '),
          fontSize: 10, color: GOLD, characterSpacing: 1.5,
          alignment: 'center', margin: [0, 0, 0, 8]
        });
      }

      /* Convidados + tipo + horas — subtle white */
      var infoLine = [];
      if (cliente.convidados) infoLine.push(cliente.convidados + ' CONVIDADOS');
      if (cliente.tipo) infoLine.push(cliente.tipo.toUpperCase());
      if (cliente.horas) infoLine.push(cliente.horas + 'H DE EVENTO');
      if (infoLine.length) {
        blocks.push({
          text: infoLine.join('   ·   '),
          fontSize: 7, color: '#FFFFFF55', characterSpacing: 2.5,
          alignment: 'center', margin: [0, 0, 0, 52]
        });
      } else {
        blocks.push({ text: '', margin: [0, 0, 0, 52] });
      }

      /* Tagline — elegant italic */
      blocks.push({
        text: frase,
        fontSize: 10, color: '#FFFFFFBB', italics: true,
        alignment: 'center', lineHeight: 1.8, characterSpacing: 0.3,
        margin: [20, 0, 20, 0]
      });

      return blocks;
    }

    /* ── Package name with gold highlight ───────────────────────────────── */
    function buildNomeParts(nome, destaque) {
      var n = (nome || '').toUpperCase();
      var d = (destaque || '').toUpperCase();
      if (!d || n.indexOf(d) === -1) {
        return [{ text: n, color: '#FFFFFF', bold: true, fontSize: 13, characterSpacing: 1.5, lineHeight: 1 }];
      }
      var idx = n.indexOf(d);
      var parts = [];
      if (idx > 0) parts.push({ text: n.slice(0, idx), color: '#FFFFFF', bold: true, fontSize: 13, characterSpacing: 1.5 });
      parts.push({ text: d, color: GOLD, bold: true, fontSize: 13, characterSpacing: 1.5 });
      if (idx + d.length < n.length) parts.push({ text: n.slice(idx + d.length), color: '#FFFFFF', bold: true, fontSize: 13, characterSpacing: 1.5 });
      return parts;
    }

    /* ── Página 2 — Experiência Gastronômica + Investimento ─────────────── */
    function buildExperienciaGastronomica(pacotes, p2) {
      var blocks = [];

      /* Page heading */
      blocks.push({ text: 'EXPERIÊNCIA', fontSize: 6.5, color: GRAY, characterSpacing: 3.5, bold: true, alignment: 'center', margin: [0, 0, 0, 5] });
      blocks.push({ text: 'Gastronômica', fontSize: 28, bold: true, color: NAVY, alignment: 'center', characterSpacing: 0.5, margin: [0, 0, 0, 8] });
      blocks.push({
        canvas: [{ type: 'line', x1: 177, y1: 0, x2: 318, y2: 0, lineWidth: 0.6, lineColor: GOLD + '88' }],
        margin: [0, 0, 0, 26]
      });

      pacotes.forEach(function(pacote, pi) {
        if (pi > 0) { blocks.push(sectionDivider()); blocks.push({ text: '', margin: [0, 0, 0, 6] }); }

        /* Package label (only when multiple packages) */
        if (pacotes.length > 1 && pacote.nome) {
          blocks.push({ text: (pacote.nome || '').toUpperCase(), fontSize: 7, color: GOLD, characterSpacing: 2.5, bold: true, margin: [0, 0, 0, 12] });
        }

        var secoesAtivas = (pacote.secoes || []).filter(function(s) { return s.ativa; });
        secoesAtivas.forEach(function(secao, i) {
          var nome = (secao.nome || '').trim();
          if (!nome) return;
          /* Section name — small uppercase label */
          blocks.push({ text: nome.toUpperCase(), fontSize: 7.5, color: NAVY, bold: true, characterSpacing: 2, margin: [0, i > 0 ? 13 : 0, 0, 4] });
          /* Narrative description */
          if (secao.detalhes && secao.detalhes.trim()) {
            blocks.push({ text: secao.detalhes.trim(), fontSize: 9, color: GRAY, lineHeight: 1.55 });
          }
        });
      });

      /* ── Investimento ── */
      blocks.push({ canvas: [{ type: 'line', x1: 0, y1: 0, x2: 475, y2: 0, lineWidth: 0.4, lineColor: '#E5E7EB' }], margin: [0, 26, 0, 22] });
      blocks.push({ text: 'INVESTIMENTO', fontSize: 6.5, color: GRAY, characterSpacing: 3.5, bold: true, alignment: 'center', margin: [0, 0, 0, 20] });

      pacotes.forEach(function(pacote, pi) {
        var inv = pacote.investimento || {};
        var preco = inv.precoFinal || inv.precoOriginal;

        if (pi > 0) { blocks.push({ canvas: [{ type: 'line', x1: 0, y1: 0, x2: 475, y2: 0, lineWidth: 0.4, lineColor: '#E5E7EB' }], margin: [0, 18, 0, 18] }); }

        if (pacotes.length > 1 && pacote.nome) {
          blocks.push({ text: (pacote.nome || '').toUpperCase(), fontSize: 7, color: GOLD, characterSpacing: 2.5, bold: true, margin: [0, 0, 0, 12] });
        }

        if (inv.mostrarDesconto && inv.precoOriginal && inv.precoFinal) {
          blocks.push({ text: [{ text: 'De  ' }, { text: fmtMoeda(inv.precoOriginal), decoration: 'lineThrough' }], fontSize: 9, color: GRAY, margin: [0, 0, 0, 4] });
          blocks.push({ text: fmtMoeda(inv.precoFinal), fontSize: 42, bold: true, color: NAVY, lineHeight: 1, margin: [0, 0, 0, 4] });
        } else if (preco) {
          blocks.push({ text: fmtMoeda(preco), fontSize: 42, bold: true, color: NAVY, lineHeight: 1, margin: [0, 0, 0, 4] });
        }
        blocks.push({ text: 'por convidado', fontSize: 8, color: GRAY, italics: true, margin: [0, 0, 0, 14] });

        var extras = [];
        if (inv.mostrarTaxa && inv.taxaValor) extras.push([inv.taxaDesc || 'Taxa de deslocamento', fmtMoeda(inv.taxaValor)]);
        (inv.adicionais || []).filter(function(a) { return a.desc || a.valor; }).forEach(function(a) {
          extras.push([a.desc || 'Adicional', fmtMoeda(a.valor)]);
        });
        extras.forEach(function(e) {
          blocks.push({ columns: [{ text: e[0], fontSize: 8.5, color: GRAY }, { text: e[1], fontSize: 9, bold: true, color: NAVY, alignment: 'right' }], margin: [0, 0, 0, 5] });
        });

        if (inv.validade || inv.condicoes) {
          blocks.push({ text: '', margin: [0, 8, 0, 0] });
          if (inv.validade) blocks.push({ text: [{ text: 'Validade:  ', bold: true, color: NAVY }, { text: inv.validade, color: GRAY }], fontSize: 7.5, margin: [0, 0, 0, 3] });
          if (inv.condicoes) blocks.push({ text: [{ text: 'Pagamento:  ', bold: true, color: NAVY }, { text: inv.condicoes, color: GRAY }], fontSize: 7.5 });
        }
      });

      return blocks;
    }

    /* ── Página 3 — Incluso + Staff ──────────────────────────────────────── */
    function buildInclusoPage(p2) {
      var blocks = [];
      var MGRAY = '#9CA3AF';

      /* Page heading */
      blocks.push({ text: 'O QUE ESTÁ', fontSize: 6.5, color: GRAY, characterSpacing: 3.5, bold: true, alignment: 'center', margin: [0, 0, 0, 5] });
      blocks.push({ text: 'Incluso & Não Incluso', fontSize: 26, bold: true, color: NAVY, alignment: 'center', characterSpacing: 0.5, margin: [0, 0, 0, 8] });
      blocks.push({
        canvas: [{ type: 'line', x1: 177, y1: 0, x2: 318, y2: 0, lineWidth: 0.6, lineColor: GOLD + '88' }],
        margin: [0, 0, 0, 28]
      });

      function iRow(txt, col) {
        return { columns: [{ canvas: [{ type: 'ellipse', x: 3, y: 5, r1: 1.8, r2: 1.8, color: col }], width: 10 }, { text: txt, fontSize: 8, color: GRAY, lineHeight: 1.45 }], columnGap: 5, margin: [0, 0, 0, 6] };
      }
      function iLabel(t, c) { return { text: t, fontSize: 6.5, color: c || GOLD, characterSpacing: 2, bold: true, margin: [0, 0, 0, 10] }; }

      blocks.push({ columns: [{ stack: [iLabel('INCLUSO')].concat(INCLUSO.map(function(x) { return iRow(x, GOLD); })), width: '*' }, { stack: [iLabel('NÃO INCLUSO', MGRAY)].concat(NAO_INCLUSO.map(function(x) { return iRow(x, MGRAY); })), width: '*' }], columnGap: 28 });

      /* ── Alimentação de Staff ── */
      blocks.push({ text: '', margin: [0, 26, 0, 0] });
      blocks.push({ columns: [{ canvas: [{ type: 'rect', x: 0, y: 2, w: 2, h: 8, color: GOLD }], width: 8 }, { text: 'ALIMENTAÇÃO DE STAFF', fontSize: 6.5, color: GOLD, characterSpacing: 2, bold: true }], margin: [0, 0, 0, 8] });
      blocks.push({ text: 'Válido somente para staffs de outras empresas que estarão trabalhando durante o evento. Não podemos mesclar o tipo de alimentação — todos os profissionais do evento devem se enquadrar na mesma opção.', fontSize: 8, color: GRAY, lineHeight: 1.5, margin: [0, 0, 0, 10] });
      [
        { n: '01', t: 'Mesmo menu dos convidados por 50% do valor por convidado.' },
        { n: '02', t: 'Buffet separado por R$ 110,00 (segue o mesmo padrão do jantar da festa).' }
      ].forEach(function(opt) {
        blocks.push({ columns: [{ text: opt.n, fontSize: 7.5, bold: true, color: GOLD, width: 22 }, { text: opt.t, fontSize: 8, color: DGRAY, lineHeight: 1.4 }], margin: [0, 0, 0, 5] });
      });
      blocks.push({ text: 'Obs.: ainda existe a possibilidade de não nos responsabilizarmos pela alimentação dos profissionais terceiros.', fontSize: 7.5, color: GRAY, italics: true, margin: [0, 6, 0, 0] });
      if (p2 && p2.valorSeguro) blocks.push({ text: [{ text: 'Taxa de seguro: ', bold: true, color: NAVY }, { text: fmtMoeda(p2.valorSeguro) + ' por convidado.', color: GRAY }], fontSize: 8, margin: [0, 4, 0, 0] });
      if (p2 && p2.valorStaff)  blocks.push({ text: [{ text: 'Alimentação de staff: ', bold: true, color: NAVY }, { text: fmtMoeda(p2.valorStaff) + ' por profissional.', color: GRAY }], fontSize: 8, margin: [0, 4, 0, 0] });

      /* Quebras e perdas */
      if (p2 && p2.quebrasAtiva) {
        blocks.push({ text: '', margin: [0, 20, 0, 0] });
        blocks.push({ columns: [{ canvas: [{ type: 'rect', x: 0, y: 2, w: 2, h: 8, color: MGRAY }], width: 8 }, { text: 'QUEBRAS E PERDAS', fontSize: 6.5, color: MGRAY, characterSpacing: 2, bold: true }], margin: [0, 0, 0, 8] });
        blocks.push({ text: 'Para eventos com self-service ou situações de alto risco operacional, aplicamos uma taxa de seguro sobre quebras e perdas de materiais.', fontSize: 8, color: GRAY, lineHeight: 1.5, margin: [0, 0, 0, 6] });
        if (p2.valorSeguro) blocks.push({ text: [{ text: 'Taxa: ', bold: true, color: NAVY }, { text: fmtMoeda(p2.valorSeguro) + ' por convidado.', color: GRAY }], fontSize: 8, margin: [0, 0, 0, 3] });
        if (p2.valorStaff)  blocks.push({ text: [{ text: 'Staff: ', bold: true, color: NAVY }, { text: fmtMoeda(p2.valorStaff) + ' por profissional.', color: GRAY }], fontSize: 8 });
      }

      return blocks;
    }

    /* ── Página 4 — Autoridade + Encerramento ────────────────────────────── */
    function buildAutoridade(sobreTexto) {
      var blocks = [];

      /* Heading */
      blocks.push({ text: 'SOBRE O', fontSize: 6.5, color: GRAY, characterSpacing: 3.5, bold: true, alignment: 'center', margin: [0, 0, 0, 5] });
      blocks.push({ text: 'Rondello Buffet', fontSize: 28, bold: true, color: NAVY, alignment: 'center', characterSpacing: 0.5, margin: [0, 0, 0, 28] });

      /* Brand story */
      var texto = sobreTexto || 'Há quase 30 anos criando experiências gastronômicas inesquecíveis.\n\nCom gastronomia assinada por chef formado pela Le Cordon Bleu, o Rondello Buffet tornou-se referência em eventos de alto padrão na região.';
      blocks.push({ text: texto, fontSize: 10, color: GRAY, lineHeight: 1.8, alignment: 'center', margin: [20, 0, 20, 32] });

      /* Subtle divider */
      blocks.push({ canvas: [{ type: 'line', x1: 187, y1: 0, x2: 308, y2: 0, lineWidth: 0.4, lineColor: GOLD + '55' }], margin: [0, 0, 0, 26] });

      /* Próximos passos */
      blocks.push({ text: 'PRÓXIMOS PASSOS', fontSize: 6.5, color: GOLD, characterSpacing: 3, bold: true, alignment: 'center', margin: [0, 0, 0, 22] });
      [
        { n: '01', t: 'Aprovação',      d: 'Avalie esta proposta com tranquilidade e compartilhe com quem precisar.' },
        { n: '02', t: 'Assinatura',     d: 'Formalizamos o acordo com contrato e garantia de exclusividade da data.' },
        { n: '03', t: 'Alinhamentos',   d: 'Reunião para afinar cada detalhe do menu, logística e experiência do evento.' },
        { n: '04', t: 'Personalização', d: 'Adaptamos toda a experiência gastronômica ao estilo e desejo de vocês.' }
      ].forEach(function(step, i) {
        blocks.push({
          columns: [
            { text: step.n, fontSize: 7, bold: true, color: GOLD + 'AA', characterSpacing: 0.5, width: 28 },
            { stack: [
              { text: step.t.toUpperCase(), fontSize: 7.5, bold: true, color: NAVY, characterSpacing: 1.5, margin: [0, 0, 0, 3] },
              { text: step.d, fontSize: 8.5, color: GRAY, lineHeight: 1.55 }
            ]}
          ],
          margin: [0, 0, 0, i < 3 ? 16 : 0]
        });
      });

      /* Signature */
      blocks.push({ text: '', margin: [0, 36, 0, 0] });
      blocks.push({ canvas: [{ type: 'line', x1: 192, y1: 0, x2: 303, y2: 0, lineWidth: 0.4, lineColor: GOLD + '55' }], margin: [0, 0, 0, 14] });
      blocks.push({ text: 'Rondello Buffet', fontSize: 13, bold: true, color: NAVY, alignment: 'center', characterSpacing: 1, margin: [0, 0, 0, 5] });
      blocks.push({ text: 'www.rondellobuffet.com.br', fontSize: 7.5, color: GRAY, alignment: 'center', characterSpacing: 0.5 });

      return blocks;
    }

    /* ── Package Block (mantido para compatibilidade) ────────────────────── */
    function buildPacoteBlock(pacote, index, isLast) {
      var blocks = [];
      var inv = pacote.investimento || {};
      var num = String(index + 1).padStart(2, '0');
      var nomeParts = buildNomeParts(pacote.nome, pacote.palavraDestaque);

      /* ── Slim navy header ── */
      var headerInline = [
        { text: num + '  ', color: GOLD, bold: true, fontSize: 10 },
        { text: 'PACOTE  ', color: GOLD + '88', fontSize: 6, characterSpacing: 2, bold: true }
      ].concat(nomeParts);

      blocks.push({
        table: { widths: ['*'], body: [[{ text: headerInline, fillColor: NAVY }]] },
        layout: {
          paddingTop: function() { return 10; }, paddingBottom: function() { return 10; },
          paddingLeft: function() { return 18; }, paddingRight: function() { return 18; },
          hLineWidth: function() { return 0; }, vLineWidth: function() { return 0; }
        },
        margin: [0, 12, 0, 14]
      });

      /* ── Section list: no hairlines, just spacing ── */
      var secoesAtivas = (pacote.secoes || []).filter(function(s) { return s.ativa; });
      secoesAtivas.forEach(function(secao) {
        var nome = (secao.nome || '').trim();
        if (!nome) return;
        blocks.push({
          columns: [
            { canvas: [{ type: 'ellipse', x: 3, y: 5, r1: 2, r2: 2, color: GOLD }], width: 13 },
            {
              stack: [
                { text: nome.toUpperCase(), bold: true, color: NAVY, fontSize: 8.5, characterSpacing: 0.7 }
              ].concat(
                (secao.detalhes && secao.detalhes.trim())
                  ? [{ text: secao.detalhes.trim(), color: GRAY, fontSize: 8, italics: true, margin: [0, 1, 0, 0] }]
                  : []
              )
            }
          ],
          margin: [0, 0, 0, 7]
        });
      });

      /* ── Investment: floating, no separator lines ── */
      var preco = inv.precoFinal || inv.precoOriginal;
      var temTaxa = inv.mostrarTaxa && inv.taxaValor;
      var temAdic = (inv.adicionais || []).some(function(a) { return a.desc || a.valor; });

      if (preco || temTaxa || temAdic) {
        blocks.push({ text: '', margin: [0, 12, 0, 0] });

        /* Price */
        if (inv.mostrarDesconto && inv.precoOriginal && inv.precoFinal) {
          blocks.push({
            columns: [
              {
                stack: [
                  { text: 'VALOR POR PESSOA', fontSize: 6.5, color: GRAY, characterSpacing: 1.5, bold: true },
                  { text: 'investimento', fontSize: 7.5, color: GRAY, italics: true, margin: [0, 2, 0, 0] }
                ]
              },
              {
                stack: [
                  { text: [{ text: 'De  ' }, { text: fmtMoeda(inv.precoOriginal), decoration: 'lineThrough' }],
                    fontSize: 8, color: GRAY, alignment: 'right', margin: [0, 0, 0, 2] },
                  { text: fmtMoeda(inv.precoFinal), fontSize: 26, bold: true, color: NAVY, alignment: 'right', lineHeight: 1 }
                ],
                alignment: 'right'
              }
            ]
          });
        } else if (preco) {
          blocks.push({
            columns: [
              {
                stack: [
                  { text: 'VALOR POR PESSOA', fontSize: 6.5, color: GRAY, characterSpacing: 1.5, bold: true },
                  { text: 'investimento', fontSize: 7.5, color: GRAY, italics: true, margin: [0, 2, 0, 0] }
                ]
              },
              { text: fmtMoeda(preco), fontSize: 26, bold: true, color: NAVY, alignment: 'right', lineHeight: 1 }
            ]
          });
        }

        /* Extras */
        var extras = [];
        if (temTaxa) extras.push([inv.taxaDesc || 'Taxa de deslocamento', fmtMoeda(inv.taxaValor)]);
        (inv.adicionais || []).filter(function(a) { return a.desc || a.valor; }).forEach(function(a) {
          extras.push([a.desc || 'Adicional', fmtMoeda(a.valor)]);
        });
        if (extras.length) {
          blocks.push({ text: '', margin: [0, 10, 0, 0] });
          extras.forEach(function(e) {
            blocks.push({
              columns: [
                { text: e[0], fontSize: 8.5, color: GRAY },
                { text: e[1], fontSize: 9, bold: true, color: NAVY, alignment: 'right' }
              ],
              margin: [0, 0, 0, 4]
            });
          });
        }

        /* Validade / Condições */
        if (inv.validade || inv.condicoes) {
          blocks.push({ text: '', margin: [0, 8, 0, 0] });
          if (inv.validade) blocks.push({ text: [{ text: 'Validade:  ', bold: true, color: NAVY }, { text: inv.validade, color: GRAY }], fontSize: 7.5, margin: [0, 0, 0, 3] });
          if (inv.condicoes) blocks.push({ text: [{ text: 'Pagamento:  ', bold: true, color: NAVY }, { text: inv.condicoes, color: GRAY }], fontSize: 7.5 });
        }
      }

      /* Inter-package divider */
      if (!isLast) blocks.push(sectionDivider());
      return blocks;
    }

    /* ── Cardápio ────────────────────────────────────────────────────────── */
    function buildCardapio(categorias) {
      var blocks = [];

      /* Page title */
      blocks.push({ text: 'CARDAPIO', fontSize: 7, color: GRAY, characterSpacing: 3, alignment: 'center', margin: [0, 0, 0, 6] });
      blocks.push({ text: 'Seleção Gastronômica', fontSize: 16, bold: true, color: NAVY, characterSpacing: 0.5, alignment: 'center', margin: [0, 0, 0, 4] });
      blocks.push(Object.assign(doubleRule(495), { margin: [0, 6, 0, 22] }));

      categorias.forEach(function(cat, ci) {
        if (!cat.categoria && (!cat.pratos || !cat.pratos.some(function(p) { return p.nome; }))) return;

        /* Category header */
        blocks.push({
          columns: [
            hairline(60, GOLD + '88', [0, 7, 0, 0]),
            {
              text: (cat.categoria || 'Categoria').toUpperCase(),
              fontSize: 9, bold: true, color: NAVY, characterSpacing: 1.8, alignment: 'center',
              margin: [8, 0, 8, 0]
            },
            hairline(60, GOLD + '88', [0, 7, 0, 0])
          ],
          columnGap: 0,
          margin: [0, ci > 0 ? 18 : 0, 0, 10]
        });

        var pratos = (cat.pratos || []).filter(function(p) { return p.nome; });
        pratos.forEach(function(prato, pi) {
          var pratoStack = [{ text: prato.nome, fontSize: 10, bold: true, color: NAVY, lineHeight: 1.2 }];
          if (prato.desc) pratoStack.push({ text: prato.desc, fontSize: 8.5, color: GRAY, italics: true, lineHeight: 1.35, margin: [0, 2, 0, 0] });

          /* Thin separator between dishes (not after last) */
          if (pi > 0) {
            blocks.push(hairline(495, GOLD + '22', [0, 0, 0, 6]));
          }
          blocks.push({ stack: pratoStack, margin: [0, 0, 0, 6] });
        });
      });

      return blocks;
    }

    /* ── Main entry — 4 páginas premium ────────────────────────────────── */
    window.gerarPDF = function(dados) {
      var logo = window.LOGO_B64;
      var cliente = dados.cliente || {};
      var pacotes = dados.pacotes || [];
      var p2 = dados.pagina2 || {};
      var fraseCapa = dados.fraseCapa || 'Uma experiência gastronômica criada exclusivamente para seu casamento.';
      var sobreTexto = dados.sobreTexto || '';

      var content = [];

      /* Página 1 — Capa emocional (fundo navy via background) */
      content = content.concat(buildCover(cliente, fraseCapa));

      /* Página 2 — Experiência Gastronômica + Investimento */
      content.push({ text: '', pageBreak: 'before' });
      content = content.concat(buildExperienciaGastronomica(pacotes, p2));

      /* Página 3 — Incluso, Não Incluso + Staff */
      content.push({ text: '', pageBreak: 'before' });
      content = content.concat(buildInclusoPage(p2));

      /* Página 4 — Autoridade + Encerramento */
      content.push({ text: '', pageBreak: 'before' });
      content = content.concat(buildAutoridade(sobreTexto));

      /* Cardápio (opcional) */
      var temCard = dados.incluirCardapio && (dados.cardapio || []).some(function(c) {
        return c.categoria || (c.pratos && c.pratos.some(function(p) { return p.nome; }));
      });
      if (temCard) {
        content.push({ text: '', pageBreak: 'before' });
        content = content.concat(buildCardapio(dados.cardapio));
      }

      var docDef = {
        pageSize: 'A4',
        pageMargins: [60, 90, 60, 55],

        /* Fundo azul-noturno profundo na página 1 */
        background: function(currentPage, pageSize) {
          if (currentPage === 1) {
            return { canvas: [{ type: 'rect', x: 0, y: 0, w: pageSize.width, h: pageSize.height, color: '#091524' }] };
          }
        },

        header: function(currentPage) {
          if (currentPage === 1) {
            /* Header da capa: logo grande + marca em branco/dourado */
            return {
              margin: [60, 18, 60, 0],
              stack: [
                { columns: [
                  { image: logo, width: 92, margin: [0, 0, 0, 0] },
                  { stack: [
                    { text: 'RONDELLO BUFFET', fontSize: 10, color: '#FFFFFF', characterSpacing: 4, bold: true, alignment: 'right', margin: [0, 0, 0, 3] },
                    { text: 'BUFFET DE ALTO PADRÃO', fontSize: 5.5, color: GOLD + 'BB', characterSpacing: 3, bold: true, alignment: 'right' }
                  ], margin: [0, 14, 0, 0] }
                ]},
                { canvas: [{ type: 'line', x1: 0, y1: 6, x2: 475, y2: 6, lineWidth: 0.35, lineColor: GOLD + '44' }], margin: [0, 8, 0, 0] }
              ]
            };
          }
          return buildHeader(logo, currentPage);
        },

        footer: function(p, n) {
          if (p === 1) {
            return { margin: [60, 0, 60, 18], text: 'www.rondellobuffet.com.br', fontSize: 7, color: GOLD + '55', alignment: 'center', characterSpacing: 1 };
          }
          return buildFooter(p, n);
        },

        content: content,
        styles: {
          p2I: { fontSize: 8.5, color: DGRAY, lineHeight: 1.5 },
          obs: { fontSize: 8.5, color: GRAY },
          catT: { fontSize: 9, color: NAVY, bold: true, characterSpacing: 1.8 },
          pratoN: { fontSize: 10, color: NAVY, bold: true },
          pratoD: { fontSize: 8.5, color: GRAY, italics: true, lineHeight: 1.35 },
          footer: { fontSize: 7, color: GRAY }
        },
        defaultStyle: { font: 'Roboto', fontSize: 9 }
      };

      var nome = cliente.nome
        ? 'Rondello - Proposta ' + cliente.nome + '.pdf'
        : 'Rondello - Proposta.pdf';

      pdfMake.createPdf(docDef).getBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = nome;
        document.body.appendChild(a); a.click();
        setTimeout(function() { document.body.removeChild(a); URL.revokeObjectURL(url); }, 1000);
      });
    };
  })();
  </script>

<body>
  <div id="root"></div>
  <script type="text/babel">
  /* ── Constants ─────────────────────────────────────────────────────────── */
  const NAVY  = '#1B3A5C';
  const GOLD  = '#C9A87A';
  const LGOLD = '#FBF6EE';
  const GRAY  = '#6B7280';

  const SECOES_PADRAO = [
    'Welcome Drink','Bebidas','Finger Foods','Mini Pratos',
    'Ilha Gourmet','Jantar','Sobremesa','Lanchinho da Madrugada','Mesa de Café','Estações'
  ];

  function uid() { return Math.random().toString(36).slice(2, 9); }
  function makeSecao(nome, custom = false) { return { id: uid(), ativa: false, nome, detalhes: '', custom }; }
  function makeAdicional() { return { id: uid(), desc: '', valor: '' }; }

  function makePacote(n) {
    return {
      id: uid(),
      nome: n === 1 ? 'Prime' : n === 2 ? 'Classic' : `Pacote ${n}`,
      palavraDestaque: n === 1 ? 'Prime' : n === 2 ? 'Classic' : '',
      expandido: true,
      secoes: SECOES_PADRAO.map(nome => makeSecao(nome)),
      investimento: { precoOriginal:'', precoFinal:'', mostrarDesconto:false, taxaDesc:'Taxa de deslocamento', taxaValor:'', mostrarTaxa:false, adicionais:[], condicoes:'', validade:'' }
    };
  }

  /* Rebuild a state snapshot from saved JSON (adds missing ids) */
  function hydratePacote(raw) {
    return {
      ...makePacote(1),
      ...raw,
      id: uid(),
      expandido: true,
      secoes: (raw.secoes || SECOES_PADRAO.map(n => makeSecao(n))).map(s => ({ ...makeSecao(s.nome || '', s.custom || false), ...s, id: uid() })),
      investimento: { ...makePacote(1).investimento, ...(raw.investimento || {}), adicionais: ((raw.investimento || {}).adicionais || []).map(a => ({ ...makeAdicional(), ...a, id: uid() })) }
    };
  }

  /* ── Atoms ─────────────────────────────────────────────────────────────── */

  function Label({ children }) {
    return <div style={{ fontSize: 10, fontWeight: 700, color: GRAY, letterSpacing: '0.07em', marginBottom: 5, textTransform: 'uppercase' }}>{children}</div>;
  }

  function Input({ value, onChange, placeholder, type = 'text', prefix, style = {}, disabled = false }) {
    const [f, setF] = React.useState(false);
    return (
      <div style={{ position: 'relative', width: '100%' }}>
        {prefix && <span style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)', fontSize: 12, color: GRAY, pointerEvents: 'none', zIndex: 1 }}>{prefix}</span>}
        <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} disabled={disabled}
          style={{ width:'100%', boxSizing:'border-box', padding: prefix ? '7px 10px 7px 30px' : '7px 10px', borderRadius:6, border:`1.5px solid ${f ? GOLD : '#E5E7EB'}`, fontSize:13, color:NAVY, outline:'none', background: disabled ? '#F9FAFB' : '#fff', transition:'border-color .15s', ...style }}
          onFocus={() => setF(true)} onBlur={() => setF(false)}
        />
      </div>
    );
  }

  function Textarea({ value, onChange, placeholder, rows = 3 }) {
    const [f, setF] = React.useState(false);
    return (
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
        style={{ width:'100%', boxSizing:'border-box', padding:'7px 10px', borderRadius:6, border:`1.5px solid ${f ? GOLD : '#E5E7EB'}`, fontSize:13, color:NAVY, outline:'none', resize:'vertical', background:'#fff', transition:'border-color .15s' }}
        onFocus={() => setF(true)} onBlur={() => setF(false)}
      />
    );
  }

  function Toggle({ checked, onChange }) {
    return (
      <button onClick={() => onChange(!checked)} style={{ background:'none', border:'none', cursor:'pointer', padding:0, flexShrink:0 }}>
        <div style={{ width:38, height:22, borderRadius:11, background: checked ? GOLD : '#D1D5DB', position:'relative', transition:'background .2s' }}>
          <div style={{ position:'absolute', top:3, left: checked ? 19 : 3, width:16, height:16, borderRadius:'50%', background:'#fff', transition:'left .2s', boxShadow:'0 1px 3px rgba(0,0,0,.2)' }} />
        </div>
      </button>
    );
  }

  function Btn({ children, onClick, variant = 'primary', style = {}, loading = false }) {
    const v = { primary:{background:NAVY,color:'#fff',border:'none'}, ghost:{background:'transparent',color:NAVY,border:'1.5px solid #E5E7EB'}, danger:{background:'transparent',color:'#EF4444',border:'1.5px solid #FCA5A5'}, gold:{background:GOLD,color:'#fff',border:'none'} };
    return (
      <button onClick={onClick} disabled={loading}
        style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', gap:6, padding:'8px 16px', borderRadius:7, fontSize:12, fontWeight:700, cursor: loading ? 'wait' : 'pointer', letterSpacing:'0.04em', transition:'opacity .15s', opacity: loading ? 0.7 : 1, ...v[variant], ...style }}
      >{children}</button>
    );
  }

  function IconBtn({ onClick, title, children, style = {} }) {
    const [hov, setHov] = React.useState(false);
    return (
      <button onClick={onClick} title={title}
        style={{ background:'none', border:'none', cursor:'pointer', padding:'4px 6px', borderRadius:5, fontSize:15, display:'flex', alignItems:'center', color: hov ? NAVY : GRAY, transition:'color .15s', ...style }}
        onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      >{children}</button>
    );
  }

  function Card({ children, style = {} }) {
    return <div style={{ background:'#fff', borderRadius:10, border:'1px solid #E5E7EB', padding:'20px 24px', marginBottom:16, ...style }}>{children}</div>;
  }

  function SecHead({ children, right }) {
    return (
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:3, height:20, background:GOLD, borderRadius:2 }} />
          <div style={{ fontSize:12, fontWeight:700, color:NAVY, letterSpacing:'0.06em', textTransform:'uppercase' }}>{children}</div>
        </div>
        {right}
      </div>
    );
  }

  function Grid({ cols = 2, gap = 12, children }) {
    return <div style={{ display:'grid', gridTemplateColumns:`repeat(${cols}, 1fr)`, gap }}>{children}</div>;
  }

  function Field({ label, children }) {
    return <div><Label>{label}</Label>{children}</div>;
  }

  /* ── SecaoCard ─────────────────────────────────────────────────────────── */
  function SecaoCard({ secao, onChange, onDelete }) {
    return (
      <div style={{ borderRadius:8, marginBottom:6, border:`1.5px solid ${secao.ativa ? GOLD : '#E5E7EB'}`, background: secao.ativa ? '#FFFBF5' : '#FAFAFA', overflow:'hidden', transition:'border-color .2s' }}>
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px' }}>
          <Toggle checked={secao.ativa} onChange={v => onChange({ ...secao, ativa: v })} />
          {secao.custom
            ? <input value={secao.nome} onChange={e => onChange({ ...secao, nome: e.target.value })} placeholder="Nome da seção" style={{ flex:1, border:'none', background:'transparent', fontSize:13, fontWeight:600, color:NAVY, outline:'none' }} />
            : <div style={{ fontSize:13, fontWeight:600, color: secao.ativa ? NAVY : '#9CA3AF', flex:1 }}>{secao.nome}</div>
          }
          {secao.custom && <IconBtn onClick={onDelete} title="Remover" style={{ color:'#FCA5A5' }}>✕</IconBtn>}
        </div>
        {secao.ativa && (
          <div style={{ padding:'0 14px 12px', borderTop:`1px solid ${GOLD}22` }}>
            <textarea value={secao.detalhes} onChange={e => onChange({ ...secao, detalhes: e.target.value })} placeholder="Detalhes, itens, quantidade... (opcional)" rows={2}
              style={{ width:'100%', boxSizing:'border-box', marginTop:8, padding:'6px 10px', borderRadius:6, border:'1px solid #E5E7EB', fontSize:12, color:'#374151', resize:'vertical', outline:'none', background:'#fff' }}
            />
          </div>
        )}
      </div>
    );
  }

  /* ── InvestimentoEditor ────────────────────────────────────────────────── */
  function InvestimentoEditor({ inv, onChange }) {
    const set = (k, v) => onChange({ ...inv, [k]: v });
    const addA = () => onChange({ ...inv, adicionais: [...(inv.adicionais || []), makeAdicional()] });
    const setA = (i, f, v) => { const c = [...(inv.adicionais || [])]; c[i] = { ...c[i], [f]: v }; onChange({ ...inv, adicionais: c }); };
    const remA = i => onChange({ ...inv, adicionais: (inv.adicionais || []).filter((_, j) => j !== i) });

    return (
      <div>
        <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:14 }}>
          <Toggle checked={inv.mostrarDesconto} onChange={v => set('mostrarDesconto', v)} />
          <span style={{ fontSize:12, color:GRAY, fontWeight:600 }}>Exibir preço De / Por</span>
        </div>
        <Grid>
          {inv.mostrarDesconto && (
            <Field label="Preço original (De)"><Input prefix="R$" value={inv.precoOriginal} onChange={v => set('precoOriginal', v)} placeholder="0,00" /></Field>
          )}
          <Field label={inv.mostrarDesconto ? 'Preço final (Por)' : 'Valor por pessoa'}>
            <Input prefix="R$" value={inv.precoFinal} onChange={v => set('precoFinal', v)} placeholder="0,00" />
          </Field>
        </Grid>
        <div style={{ display:'flex', alignItems:'center', gap:10, margin:'14px 0 10px' }}>
          <Toggle checked={inv.mostrarTaxa} onChange={v => set('mostrarTaxa', v)} />
          <span style={{ fontSize:12, color:GRAY, fontWeight:600 }}>Taxa de deslocamento</span>
        </div>
        {inv.mostrarTaxa && (
          <Grid style={{ marginBottom:8 }}>
            <Field label="Descrição"><Input value={inv.taxaDesc} onChange={v => set('taxaDesc', v)} placeholder="Taxa de deslocamento" /></Field>
            <Field label="Valor"><Input prefix="R$" value={inv.taxaValor} onChange={v => set('taxaValor', v)} placeholder="0,00" /></Field>
          </Grid>
        )}
        {(inv.adicionais || []).map((a, i) => (
          <div key={a.id} style={{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:8, alignItems:'end', marginBottom:8 }}>
            <Field label={`Extra ${i + 1}`}><Input value={a.desc} onChange={v => setA(i, 'desc', v)} placeholder="Descrição" /></Field>
            <Field label="Valor"><Input prefix="R$" value={a.valor} onChange={v => setA(i, 'valor', v)} placeholder="0,00" /></Field>
            <div style={{ paddingBottom:1 }}><IconBtn onClick={() => remA(i)} title="Remover" style={{ color:'#FCA5A5' }}>✕</IconBtn></div>
          </div>
        ))}
        <button onClick={addA} style={{ background:'none', border:'1px dashed #D1D5DB', borderRadius:6, padding:'6px 14px', fontSize:11, color:GRAY, cursor:'pointer', marginBottom:14 }}>+ Item extra</button>
        <Grid>
          <Field label="Condições de pagamento"><Input value={inv.condicoes} onChange={v => set('condicoes', v)} placeholder="Ex: 50% na assinatura..." /></Field>
          <Field label="Validade da proposta"><Input value={inv.validade} onChange={v => set('validade', v)} placeholder="Ex: 31/05/2025" /></Field>
        </Grid>
      </div>
    );
  }

  /* ── PacoteCard ────────────────────────────────────────────────────────── */
  function PacoteCard({ pacote, index, total, onChange, onDelete, onMoveUp, onMoveDown }) {
    const set = (k, v) => onChange({ ...pacote, [k]: v });
    const setSecao = (i, s) => { const c = [...pacote.secoes]; c[i] = s; onChange({ ...pacote, secoes: c }); };
    const addCustom = () => onChange({ ...pacote, secoes: [...pacote.secoes, makeSecao('', true)] });
    const delSecao = i => onChange({ ...pacote, secoes: pacote.secoes.filter((_, j) => j !== i) });
    const ativas = pacote.secoes.filter(s => s.ativa).length;

    return (
      <div style={{ borderRadius:10, border:'1px solid #D1D5DB', marginBottom:16, overflow:'hidden', boxShadow:'0 2px 8px rgba(0,0,0,.06)' }}>
        <div style={{ background:NAVY, padding:'13px 18px', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div style={{ display:'flex', alignItems:'center', gap:12 }}>
            <div style={{ width:28, height:28, borderRadius:'50%', background:`${GOLD}22`, border:`1.5px solid ${GOLD}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:11, fontWeight:700, color:GOLD, flexShrink:0 }}>
              {String(index + 1).padStart(2, '0')}
            </div>
            <div>
              <div style={{ fontSize:10, color:`${GOLD}99`, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase' }}>PACOTE</div>
              <input value={pacote.nome} onChange={e => set('nome', e.target.value)} placeholder="Nome do pacote"
                style={{ background:'transparent', border:'none', outline:'none', fontSize:15, fontWeight:700, color:'#fff', letterSpacing:'0.02em', width:220 }}
              />
            </div>
          </div>
          <div style={{ display:'flex', gap:2, alignItems:'center' }}>
            {total > 1 && index > 0 && <IconBtn onClick={onMoveUp} title="Mover acima" style={{ color:`${GOLD}88`, fontSize:12 }}>▲</IconBtn>}
            {total > 1 && index < total - 1 && <IconBtn onClick={onMoveDown} title="Mover abaixo" style={{ color:`${GOLD}88`, fontSize:12 }}>▼</IconBtn>}
            {total > 1 && <IconBtn onClick={onDelete} title="Remover pacote" style={{ color:'#FCA5A5' }}>✕</IconBtn>}
            <IconBtn onClick={() => set('expandido', !pacote.expandido)} title={pacote.expandido ? 'Recolher' : 'Expandir'} style={{ color:`${GOLD}BB`, fontSize:13 }}>
              {pacote.expandido ? '▲' : '▼'}
            </IconBtn>
          </div>
        </div>

        {pacote.expandido && (
          <div style={{ padding:'20px 20px 24px', background:'#fff' }}>
            <div style={{ marginBottom:20 }}>
              <Field label="Palavra destaque no PDF (em dourado)">
                <Input value={pacote.palavraDestaque} onChange={v => set('palavraDestaque', v)} placeholder="Ex: Prime, Classic, Gold..." />
              </Field>
            </div>
            <SecHead right={<span style={{ fontSize:11, color: ativas > 0 ? GOLD : GRAY, fontWeight:600 }}>{ativas} ativa{ativas !== 1 ? 's' : ''}</span>}>Seções</SecHead>
            {pacote.secoes.map((s, i) => (
              <SecaoCard key={s.id} secao={s} onChange={u => setSecao(i, u)} onDelete={() => delSecao(i)} />
            ))}
            <button onClick={addCustom} style={{ width:'100%', background:'none', border:`1.5px dashed ${GOLD}77`, borderRadius:8, padding:9, fontSize:12, color:GOLD, cursor:'pointer', fontWeight:600, marginBottom:24 }}>+ Seção personalizada</button>
            <SecHead>Investimento</SecHead>
            <InvestimentoEditor inv={pacote.investimento} onChange={v => set('investimento', v)} />
          </div>
        )}
      </div>
    );
  }

  /* ── CardapioEditor ────────────────────────────────────────────────────── */
  function CardapioEditor({ cardapio, onChange }) {
    const addCat = () => onChange([...cardapio, { id:uid(), categoria:'', pratos:[{ id:uid(), nome:'', desc:'' }] }]);
    const remCat = i => onChange(cardapio.filter((_,j) => j !== i));
    const setCat = (i, f, v) => { const c=[...cardapio]; c[i]={...c[i],[f]:v}; onChange(c); };
    const addPrato = i => { const c=[...cardapio]; c[i]={...c[i],pratos:[...c[i].pratos,{id:uid(),nome:'',desc:''}]}; onChange(c); };
    const setPrato = (ci,pi,f,v) => { const c=[...cardapio]; const ps=[...c[ci].pratos]; ps[pi]={...ps[pi],[f]:v}; c[ci]={...c[ci],pratos:ps}; onChange(c); };
    const remPrato = (ci,pi) => { const c=[...cardapio]; c[ci]={...c[ci],pratos:c[ci].pratos.filter((_,j)=>j!==pi)}; onChange(c); };

    return (
      <div>
        {cardapio.map((cat, ci) => (
          <div key={cat.id} style={{ marginBottom:20, borderRadius:8, border:'1px solid #E5E7EB', padding:16, background:'#FAFAFA' }}>
            <div style={{ display:'flex', gap:10, alignItems:'flex-end', marginBottom:12 }}>
              <div style={{ flex:1 }}><Field label={`Categoria ${ci+1}`}><Input value={cat.categoria} onChange={v => setCat(ci,'categoria',v)} placeholder="Ex: Finger Foods" /></Field></div>
              {cardapio.length > 1 && <IconBtn onClick={() => remCat(ci)} title="Remover" style={{ color:'#FCA5A5', marginBottom:2 }}>✕</IconBtn>}
            </div>
            {cat.pratos.map((p, pi) => (
              <div key={p.id} style={{ display:'grid', gridTemplateColumns:'1fr 1fr auto', gap:8, alignItems:'end', marginBottom:8 }}>
                <Field label={`Prato ${pi+1}`}><Input value={p.nome} onChange={v => setPrato(ci,pi,'nome',v)} placeholder="Nome" /></Field>
                <Field label="Descrição"><Input value={p.desc} onChange={v => setPrato(ci,pi,'desc',v)} placeholder="Ingredientes..." /></Field>
                <div style={{ paddingBottom:1 }}>{cat.pratos.length > 1 && <IconBtn onClick={() => remPrato(ci,pi)} title="Remover" style={{ color:'#FCA5A5' }}>✕</IconBtn>}</div>
              </div>
            ))}
            <button onClick={() => addPrato(ci)} style={{ background:'none', border:'1px dashed #D1D5DB', borderRadius:6, padding:'5px 12px', fontSize:11, color:GRAY, cursor:'pointer' }}>+ Prato</button>
          </div>
        ))}
        <Btn onClick={addCat} variant="ghost" style={{ width:'100%', borderStyle:'dashed', borderColor:GOLD, color:GOLD }}>+ Categoria</Btn>
      </div>
    );
  }

  /* ── ModeloSelector ────────────────────────────────────────────────────── */
  function ModeloSelector({ modelos, onLoad, onSave }) {
    const [showSave, setShowSave] = React.useState(false);
    const [nome, setNome] = React.useState('');

    function handleSave() {
      const n = nome.trim();
      if (!n) { alert('Digite um nome para o modelo'); return; }
      onSave(n);
      setNome(''); setShowSave(false);
    }

    if (!modelos.length && !showSave) return (
      <div style={{ display:'flex', justifyContent:'flex-end', marginBottom:8 }}>
        <button onClick={() => setShowSave(true)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, color:GRAY, fontFamily:'inherit', textDecoration:'underline' }}>
          Salvar como modelo
        </button>
      </div>
    );

    return (
      <div style={{ background:`${GOLD}11`, border:`1px solid ${GOLD}44`, borderRadius:10, padding:'16px 20px', marginBottom:16 }}>
        {modelos.length > 0 && (
          <>
            <div style={{ fontSize:11, fontWeight:700, color:NAVY, letterSpacing:'0.06em', textTransform:'uppercase', marginBottom:10 }}>Carregar Modelo</div>
            <div style={{ display:'flex', gap:8, flexWrap:'wrap', marginBottom: showSave ? 16 : 0 }}>
              {modelos.map(m => (
                <button key={m.id} onClick={() => onLoad(m.dados)}
                  style={{ padding:'7px 16px', borderRadius:20, border:`1.5px solid ${GOLD}`, background:'#fff', color:NAVY, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit', transition:'background .15s' }}
                  onMouseEnter={e => e.currentTarget.style.background = LGOLD}
                  onMouseLeave={e => e.currentTarget.style.background = '#fff'}
                >{m.nome}</button>
              ))}
            </div>
          </>
        )}
        {showSave ? (
          <div style={{ display:'flex', gap:8, alignItems:'flex-end' }}>
            <div style={{ flex:1 }}><Field label="Nome do modelo"><Input value={nome} onChange={setNome} placeholder="Ex: Coquetel Prime + Classic" /></Field></div>
            <Btn onClick={handleSave} variant="gold">Salvar</Btn>
            <Btn onClick={() => { setShowSave(false); setNome(''); }} variant="ghost">Cancelar</Btn>
          </div>
        ) : (
          <button onClick={() => setShowSave(true)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:11, color:GRAY, fontFamily:'inherit', textDecoration:'underline', marginTop: modelos.length ? 4 : 0 }}>
            Salvar estado atual como modelo
          </button>
        )}
      </div>
    );
  }

  /* ── App ───────────────────────────────────────────────────────────────── */
  function App() {
    const [cliente, setCliente] = React.useState({ nome:'', data:'', local:'', convidados:'', tipo:'', horas:'' });
    const [fraseCapa, setFraseCapa] = React.useState('');
    const [sobreTexto, setSobreTexto] = React.useState('');
    const [pacotes, setPacotes] = React.useState([makePacote(1)]);
    const [pagina2, setP2] = React.useState({ quebrasAtiva:false, valorSeguro:'', valorStaff:'' });
    const [incluirCardapio, setCardapioToggle] = React.useState(false);
    const [cardapio, setCardapio] = React.useState([{ id:uid(), categoria:'', pratos:[{ id:uid(), nome:'', desc:'' }] }]);
    const [gerando, setGerando] = React.useState(false);
    const [modelos, setModelos] = React.useState([]);

    const setC = (k, v) => setCliente(c => ({ ...c, [k]: v }));

    /* Load a template (does NOT overwrite cliente) */
    function loadModelo(dados) {
      if (!dados) return;
      if (dados.pacotes) setPacotes(dados.pacotes.map(hydratePacote));
      if (dados.fraseCapa !== undefined) setFraseCapa(dados.fraseCapa);
      if (dados.sobreTexto !== undefined) setSobreTexto(dados.sobreTexto);
      if (dados.pagina2) setP2(p => ({ ...p, ...dados.pagina2 }));
      if (dados.incluirCardapio !== undefined) setCardapioToggle(dados.incluirCardapio);
      if (dados.cardapio) setCardapio(dados.cardapio.map(c => ({ ...c, id:uid(), pratos:(c.pratos||[]).map(p => ({ ...p, id:uid() })) })));
    }

    function getSnapshot() {
      return { pacotes: pacotes.map(p => ({ ...p, id:undefined, expandido:undefined })), fraseCapa, sobreTexto, pagina2, incluirCardapio, cardapio: cardapio.map(c => ({ ...c, id:undefined, pratos:(c.pratos||[]).map(p => ({ ...p, id:undefined })) })) };
    }

    function handleSaveModelo(nome) {
      const dados = getSnapshot();
      try {
        window.parent.postMessage({ action:'saveModelo', nome, dados }, '*');
        alert('Modelo "' + nome + '" enviado ao Bubble!');
      } catch(e) {
        /* Fallback: copy JSON to clipboard */
        const json = JSON.stringify({ nome, dados });
        if (navigator.clipboard) navigator.clipboard.writeText(json).then(() => alert('JSON copiado — cole no campo dados_json do Bubble.'));
        else alert('JSON do modelo:\n\n' + json);
      }
    }

    /* postMessage + URL params on mount */
    React.useEffect(() => {
      function onMessage(e) {
        if (!e.data || typeof e.data !== 'object') return;
        if (e.data.action === 'setModelos') setModelos(e.data.modelos || []);
        if (e.data.action === 'loadModelo') loadModelo(e.data.dados);
      }
      window.addEventListener('message', onMessage);

      try {
        const params = new URLSearchParams(window.location.search);
        const mParam = params.get('modelo');
        if (mParam) loadModelo(JSON.parse(atob(mParam)));
        const msParam = params.get('modelos');
        if (msParam) setModelos(JSON.parse(atob(msParam)));
      } catch(e) {}

      /* Ask parent for modelos list */
      try { window.parent.postMessage({ action:'requestModelos' }, '*'); } catch(e) {}

      return () => window.removeEventListener('message', onMessage);
    }, []);

    const addPacote = () => setPacotes(p => [...p, makePacote(p.length + 1)]);
    const remPacote = i => setPacotes(p => p.filter((_,j) => j !== i));
    const setPacote = (i, p) => setPacotes(ps => ps.map((x,j) => j === i ? p : x));
    const movePacote = (i, dir) => {
      const c = [...pacotes]; const t = i + dir;
      if (t < 0 || t >= c.length) return;
      [c[i], c[t]] = [c[t], c[i]]; setPacotes(c);
    };

    const handleGerar = () => {
      setGerando(true);
      setTimeout(() => {
        try { window.gerarPDF({ cliente, pacotes, pagina2, fraseCapa, sobreTexto, incluirCardapio, cardapio }); }
        catch(e) { alert('Erro ao gerar PDF:\n' + e.message); }
        setGerando(false);
      }, 100);
    };

    return (
      <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column' }}>
        {/* Header */}
        <div style={{ background:NAVY, height:60, display:'flex', alignItems:'center', justifyContent:'space-between', padding:'0 24px', position:'sticky', top:0, zIndex:100, boxShadow:'0 2px 12px rgba(0,0,0,.25)' }}>
          <div style={{ display:'flex', alignItems:'center', gap:14 }}>
            <div style={{ width:2, height:28, background:GOLD }} />
            <div>
              <div style={{ fontSize:15, fontWeight:700, color:'#fff', letterSpacing:'0.04em' }}>Rondello Buffet</div>
              <div style={{ fontSize:10, color:`${GOLD}CC`, letterSpacing:'0.08em', textTransform:'uppercase' }}>Gerador de Orçamento</div>
            </div>
          </div>
          <Btn onClick={handleGerar} loading={gerando} variant="gold" style={{ minWidth:150, fontSize:13 }}>
            {gerando ? '⏳ Gerando...' : '⬇ Gerar PDF'}
          </Btn>
        </div>

        <div style={{ maxWidth:820, margin:'0 auto', padding:'28px 20px 72px', width:'100%' }}>

          {/* Modelo selector */}
          <ModeloSelector modelos={modelos} onLoad={loadModelo} onSave={handleSaveModelo} />

          {/* Cliente */}
          <Card>
            <SecHead>Dados do Cliente / Evento</SecHead>
            <Grid>
              <Field label="Nome do cliente ou casal"><Input value={cliente.nome} onChange={v => setC('nome',v)} placeholder="Ex: Juliana e Pedro" /></Field>
              <Field label="Data do evento"><Input value={cliente.data} onChange={v => setC('data',v)} placeholder="Ex: 15/06/2026" /></Field>
              <Field label="Local do evento"><Input value={cliente.local} onChange={v => setC('local',v)} placeholder="Ex: Espaço Villa Verde" /></Field>
              <Field label="Tipo de evento"><Input value={cliente.tipo} onChange={v => setC('tipo',v)} placeholder="Ex: Casamento" /></Field>
              <Field label="Número de convidados"><Input type="number" value={cliente.convidados} onChange={v => setC('convidados',v)} placeholder="Ex: 200" /></Field>
              <Field label="Horas de serviço"><Input type="number" value={cliente.horas} onChange={v => setC('horas',v)} placeholder="Ex: 6" /></Field>
            </Grid>
          </Card>

          {/* Pacotes */}
          <div style={{ marginBottom:4 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ width:3, height:20, background:GOLD, borderRadius:2 }} />
                <div style={{ fontSize:12, fontWeight:700, color:NAVY, letterSpacing:'0.06em', textTransform:'uppercase' }}>
                  Pacotes — {pacotes.length} {pacotes.length === 1 ? 'opção' : 'opções'}
                </div>
              </div>
              <Btn onClick={addPacote} variant="ghost">+ Pacote</Btn>
            </div>
            {pacotes.map((p,i) => (
              <PacoteCard key={p.id} pacote={p} index={i} total={pacotes.length}
                onChange={u => setPacote(i, u)} onDelete={() => remPacote(i)}
                onMoveUp={() => movePacote(i,-1)} onMoveDown={() => movePacote(i,1)}
              />
            ))}
          </div>

          {/* Frase da capa + Sobre */}
          <Card>
            <SecHead>Textos da Proposta</SecHead>
            <Field label="Frase da capa (Página 1)">
              <Input value={fraseCapa} onChange={setFraseCapa} placeholder="Uma experiência gastronômica criada exclusivamente para seu casamento." />
            </Field>
            <div style={{ marginTop:14 }}>
              <Field label="Sobre o Rondello (Página 4 — deixe em branco para usar o texto padrão)">
                <Textarea value={sobreTexto} onChange={setSobreTexto} placeholder={'Há quase 30 anos criando experiências gastronômicas inesquecíveis.\n\nCom gastronomia assinada por chef formado pela Le Cordon Bleu, o Rondello Buffet tornou-se referência em eventos de alto padrão na região.'} rows={4} />
              </Field>
            </div>
          </Card>

          {/* Página 3 */}
          <Card>
            <SecHead>Configurações — Página 3</SecHead>
            <div style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom: pagina2.quebrasAtiva ? 16 : 0 }}>
              <div style={{ marginTop:2 }}><Toggle checked={pagina2.quebrasAtiva} onChange={v => setP2(p => ({ ...p, quebrasAtiva:v }))} /></div>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:NAVY }}>Incluir seção "Quebras e Perdas"</div>
                <div style={{ fontSize:11, color:GRAY, marginTop:2 }}>Exibida no final da página 2, após Alimentação de Staff</div>
              </div>
            </div>
            {pagina2.quebrasAtiva && (
              <Grid>
                <Field label="Taxa de seguro (por convidado)"><Input prefix="R$" value={pagina2.valorSeguro} onChange={v => setP2(p => ({ ...p, valorSeguro:v }))} placeholder="0,00" /></Field>
                <Field label="Alimentação de staff (por profissional)"><Input prefix="R$" value={pagina2.valorStaff} onChange={v => setP2(p => ({ ...p, valorStaff:v }))} placeholder="0,00" /></Field>
              </Grid>
            )}
          </Card>

          {/* Cardápio */}
          <Card>
            <div style={{ display:'flex', alignItems:'flex-start', gap:12, marginBottom: incluirCardapio ? 20 : 0 }}>
              <div style={{ marginTop:2 }}><Toggle checked={incluirCardapio} onChange={setCardapioToggle} /></div>
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:NAVY }}>Incluir Cardápio Completo</div>
                <div style={{ fontSize:11, color:GRAY, marginTop:2 }}>Páginas adicionais no PDF com categorias e pratos detalhados</div>
              </div>
            </div>
            {incluirCardapio && <CardapioEditor cardapio={cardapio} onChange={setCardapio} />}
          </Card>

          {/* Bottom generate */}
          <div style={{ display:'flex', justifyContent:'center', marginTop:8 }}>
            <Btn onClick={handleGerar} loading={gerando} variant="gold" style={{ minWidth:230, fontSize:14, padding:'12px 28px' }}>
              {gerando ? '⏳ Gerando PDF...' : '⬇ Gerar PDF'}
            </Btn>
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
